    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Styles for the Interactive Lewis Builder and Final Report */
        .lewis-board {
            display: grid;
            grid-template-columns: 50px 40px 50px 40px 50px;
            grid-template-rows: 50px 40px 50px 40px 50px;
            gap: 4px;
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 2px dashed #cbd5e1;
            margin: 0 auto;
        }
        .lewis-cell { display: flex; align-items: center; justify-content: center; }
        .atom-box {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #cbd5e1;
            font-weight: bold; font-size: 1.25rem;
            line-height: 1; /* Optical centering */
            position: relative;
            user-select: none;
            color: #1e293b;
        }
        
        /* Dropzone */
        .dropzone { border: 2px dashed #94a3b8; background: #f8fafc; transition: all 0.2s; }
        .dropzone.drag-over { background: #e0e7ff; border-color: #6366f1; transform: scale(1.05); }
        
        /* Draggable atoms */
        .draggable-atom {
            cursor: grab;
            background: #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s;
        }
        .draggable-atom:active { cursor: grabbing; transform: scale(0.95); }
        
        .center-atom-placed { background: #e0e7ff; border-color: #818cf8; cursor: pointer; }
        .center-atom-placed:active { transform: scale(0.95); }
        
        .periph-atom-placed { background: #f8fafc; border-color: #94a3b8; cursor: pointer; }
        .periph-atom-placed:active { transform: scale(0.95); }

        /* Bonds perfectly centered */
        .bond-box { background: transparent; border-radius: 4px; user-select: none; transition: background 0.2s;}
        .bond-box-active { cursor: pointer; background: #f1f5f9; }
        .bond-box-active:hover { background: #e2e8f0; }
        .bond-h { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: stretch; padding: 0 4px; gap: 4px; }
        .bond-v { width: 100%; height: 100%; display: flex; flex-direction: row; justify-content: center; align-items: stretch; padding: 4px 0; gap: 4px; }
        .bond-line-h { height: 4px; background-color: #3b82f6; border-radius: 9999px; width: 100%; }
        .bond-line-v { width: 4px; background-color: #3b82f6; border-radius: 9999px; height: 100%; }

        /* Lone Pairs */
        .lp-dot {
            position: absolute; color: #ef4444; font-size: 1.5rem; line-height: 0;
            letter-spacing: 2px; font-weight: bold; pointer-events: none;
        }
        
        /* Auto Scroll */
        html { scroll-behavior: smooth; }

        /* License and Badge */
        .licencia-bloque { margin-top: 15px; background: #f1f5f9; color: #475569; font-size: 12px; text-align: center; border-radius: 8px; padding: 12px; border: 1px solid #e2e8f0; width: 100%; }
        .badge-container { margin-bottom: 8px; display: flex; justify-content: center; align-items: center; }
    </style>

        // --- SAFE TIMEOUT MANAGEMENT ---
        let activeTimeouts = [];
        
        function safeSetTimeout(callback, delay) {
            const id = setTimeout(() => {
                activeTimeouts = activeTimeouts.filter(t => t !== id);
                callback();
            }, delay);
            activeTimeouts.push(id);
            return id;
        }

        function clearAllTimeouts() {
            activeTimeouts.forEach(clearTimeout);
            activeTimeouts = [];
        }

        // --- DOM REFERENCES ---

        const chatBox = document.getElementById('chat-box');
        const inputArea = document.getElementById('input-area');

        // --- CHAT AND AUTO-SCROLL FUNCTIONS ---
        function scrollToBottom() {
            if (!chatBox) return;
            const scroll = () => {
                chatBox.scrollTop = chatBox.scrollHeight;
            };
            requestAnimationFrame(scroll);
            setTimeout(scroll, 50);
            setTimeout(scroll, 200);
            setTimeout(scroll, 500);
        }

        // MutationObserver for auto-scroll on ALL changes
        if (chatBox && inputArea) {
            const scrollObserver = new MutationObserver(() => {
                scrollToBottom();
            });
            scrollObserver.observe(chatBox, { childList: true, subtree: true });
            scrollObserver.observe(inputArea, { childList: true, subtree: true });
        }

            { e1: 'O', e2: 'Cl', type: 'covalent', c1: 1, c2: 2, form: 'OCl2', desc: 'Oxygen dichloride', builder: { center: 'O', periph: ['Cl', 'Cl'], expectedBondLevel: 1, expectedLp: { center: 2, periph: [3, 3] } } },
            { e1: 'H', e2: 'S', type: 'covalent', c1: 2, c2: 1, form: 'H2S', desc: 'Hydrogen sulfide', builder: { center: 'S', periph: ['H', 'H'], expectedBondLevel: 1, expectedLp: { center: 2, periph: [0, 0] } } },
            { e1: 'S', e2: 'F', type: 'covalent', c1: 1, c2: 2, form: 'SF2', desc: 'Sulfur difluoride', builder: { center: 'S', periph: ['F', 'F'], expectedBondLevel: 1, expectedLp: { center: 2, periph: [3, 3] } } },
            { e1: 'S', e2: 'Cl', type: 'covalent', c1: 1, c2: 2, form: 'SCl2', desc: 'Sulfur dichloride', builder: { center: 'S', periph: ['Cl', 'Cl'], expectedBondLevel: 1, expectedLp: { center: 2, periph: [3, 3] } } },
            { e1: 'H', e2: 'F', type: 'covalent', c1: 1, c2: 1, form: 'HF', desc: 'Hydrogen fluoride', builder: { center: 'F', periph: ['H'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [0] } } },
            { e1: 'H', e2: 'Cl', type: 'covalent', c1: 1, c2: 1, form: 'HCl', desc: 'Hydrogen chloride', builder: { center: 'Cl', periph: ['H'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [0] } } },
            { e1: 'Cl', e2: 'F', type: 'covalent', c1: 1, c2: 1, form: 'ClF', desc: 'Chlorine monofluoride', builder: { center: 'Cl', periph: ['F'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [3] } } },
            { e1: 'Br', e2: 'F', type: 'covalent', c1: 1, c2: 1, form: 'BrF', desc: 'Bromine monofluoride', builder: { center: 'Br', periph: ['F'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [3] } } },
            { e1: 'I', e2: 'F', type: 'covalent', c1: 1, c2: 1, form: 'IF', desc: 'Iodine monofluoride', builder: { center: 'I', periph: ['F'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [3] } } },
            { e1: 'Br', e2: 'Cl', type: 'covalent', c1: 1, c2: 1, form: 'BrCl', desc: 'Bromine monochloride', builder: { center: 'Br', periph: ['Cl'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [3] } } },
            { e1: 'I', e2: 'Cl', type: 'covalent', c1: 1, c2: 1, form: 'ICl', desc: 'Iodine monochloride', builder: { center: 'I', periph: ['Cl'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [3] } } },
            { e1: 'I', e2: 'Br', type: 'covalent', c1: 1, c2: 1, form: 'IBr', desc: 'Iodine monobromide', builder: { center: 'I', periph: ['Br'], expectedBondLevel: 1, expectedLp: { center: 3, periph: [3] } } }
        ];

        // --- BASIC SCENARIOS AUTO-GENERATION ---
        const nmRoots = { 'H': 'Hydride', 'F': 'Fluoride', 'Cl': 'Chloride', 'Br': 'Bromide', 'I': 'Iodide', 'O': 'Oxide', 'S': 'Sulfide', 'N': 'Nitride', 'P': 'Phosphide' };
        
        const allElementsArray = Object.values(elementsDB);
        const metalsArray = allElementsArray.filter(e => e.type === 'metal');
        const nobleGasesArray = allElementsArray.filter(e => e.type === 'noblegas');
        const ionicNonMetalsArray = allElementsArray.filter(e => e.type === 'nonmetal' && nmRoots[e.sym]);

        metalsArray.forEach(m => {
            scenarios.push({ e1: m.sym, e2: m.sym, type: 'metallic', c1: 1, c2: 0, form: m.sym, desc: `Metallic ${m.name.toLowerCase()}` });
        });

        nobleGasesArray.forEach(ng => {
            scenarios.push({ e1: ng.sym, e2: ng.sym, type: 'none', c1: 1, c2: 0, form: ng.sym, desc: `${ng.name} gas` });
        });

        metalsArray.forEach(m => {
            ionicNonMetalsArray.forEach(nm => {
                let valM = m.val;
                let valNM = nm.sym === 'H' ? 1 : 8 - nm.val;
                
                let c1 = valNM;
                let c2 = valM;
                if (c1 === c2) { c1 = 1; c2 = 1; }
                else if (c1 % 2 === 0 && c2 % 2 === 0) { c1 /= 2; c2 /= 2; }
                
                let form = `${m.sym}${c1 > 1 ? c1 : ''}${nm.sym}${c2 > 1 ? c2 : ''}`;
                let desc = `${m.name} ${nmRoots[nm.sym].toLowerCase()}`;
                
                scenarios.push({ e1: m.sym, e2: nm.sym, type: 'ionic', c1, c2, form, desc });
            });
        });

        // --- APP STATE ---
        let currentScenario = null;
        let currentStepAttempts = 0; 
        let builderState = { 
            allAtoms: [],
            inventory: [], 
            placed: { center: null, 0: null, 1: null, 2: null, 3: null },
            bonds: [0, 0, 0, 0], // 0:Left, 1:Right, 2:Bottom, 3:Top
            lp: { center: 0, 0: 0, 1: 0, 2: 0, 3: 0 } 
        };

        // --- INITIALIZATION AND SIMULATOR CORE FUNCTIONS ---
        function fillScenarioSelector() {
            const selector = document.getElementById('scenarioSelector');
            if (!selector) return;
            selector.innerHTML = '';
            
            const groups = {
                'covalent': { label: 'Molecular Covalent Substances', items: [] },
                'ionic': { label: 'Ionic Compounds', items: [] },
                'metallic': { label: 'Metals (Metallic Bond)', items: [] },
                'none': { label: 'Noble Gases (No bond)', items: [] },
                'covalent_atomic': { label: 'Covalent Network Solids (Atomic Covalent)', items: [] }
            };

            scenarios.forEach((sc, index) => {
                const groupKey = sc.type;
                if (groups[groupKey]) {
                    groups[groupKey].items.push({ index, sc });
                }
            });

            const defaultOpt = document.createElement('option');
            defaultOpt.value = 'random';
            defaultOpt.textContent = 'Select a random case';
            selector.appendChild(defaultOpt);

            Object.keys(groups).forEach(key => {
                const optGroup = document.createElement('optgroup');
                optGroup.label = groups[key].label;
                
                groups[key].items.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.index;
                    option.textContent = `${item.sc.e1 === item.sc.e2 ? item.sc.e1 : `${item.sc.e1} + ${item.sc.e2}`} — ${item.sc.desc}`;
                    optGroup.appendChild(option);
                });
                
                selector.appendChild(optGroup);
            });
        }

        function selectSpecificScenario(value) {
            if (value === 'random') {
                initSimulation();
            } else {
                const idx = parseInt(value);
                currentScenario = scenarios[idx];
                startScenario();
            }
        }

        function initSimulation() {
            const randIndex = Math.floor(Math.random() * scenarios.length);
            currentScenario = scenarios[randIndex];
            
            const selector = document.getElementById('scenarioSelector');
            if (selector) selector.value = randIndex;
            
            startScenario();
        }

        function resetCurrentSimulation() {
            if (currentScenario) {
                startScenario();
            }
        }

        function startScenario() {
            clearAllTimeouts(); 
            chatBox.innerHTML = '';
            inputArea.innerHTML = '';
            currentStepAttempts = 0;
            
            const atom1 = elementsDB[currentScenario.e1];
            const atom2 = elementsDB[currentScenario.e2];
            const isHomo = currentScenario.e1 === currentScenario.e2;

            if (isHomo) {
                stageContent.innerHTML = `
                    <div class="flex items-center justify-center fade-in">
                        <div class="flex flex-col items-center p-4 bg-slate-50 rounded-lg shadow-sm border border-slate-200">
                            <div class="w-20 h-20 rounded-full bg-blue-100 flex items-center justify-center text-3xl font-bold text-blue-700 border-4 border-blue-300 shadow-inner mb-2">
                                ${atom1.sym}
                            </div>
                            <span class="text-lg font-semibold text-slate-700">${atom1.name}</span>
                            <span class="text-sm font-bold text-slate-600 mt-1">Z = ${atom1.z}</span>
                        </div>
                    </div>
                `;
                addTutorMessage(`Hello! Let's study the bonding between atoms of <b>${atom1.name}</b>.`);
            } else {
                stageContent.innerHTML = `
                    <div class="flex items-center justify-center space-x-12 fade-in">
                        <div class="flex flex-col items-center p-4 bg-slate-50 rounded-lg shadow-sm border border-slate-200">
                            <div class="w-20 h-20 rounded-full bg-blue-100 flex items-center justify-center text-3xl font-bold text-blue-700 border-4 border-blue-300 shadow-inner mb-2">
                                ${atom1.sym}
                            </div>
                            <span class="text-lg font-semibold text-slate-700">${atom1.name}</span>
                            <span class="text-sm font-bold text-slate-600 mt-1">Z = ${atom1.z}</span>
                        </div>
                        <div class="text-3xl text-slate-400 font-bold">+</div>
                        <div class="flex flex-col items-center p-4 bg-slate-50 rounded-lg shadow-sm border border-slate-200">
                            <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center text-3xl font-bold text-green-700 border-4 border-green-300 shadow-inner mb-2">
                                ${atom2.sym}
                            </div>
                            <span class="text-lg font-semibold text-slate-700">${atom2.name}</span>
                            <span class="text-sm font-bold text-slate-600 mt-1">Z = ${atom2.z}</span>
                        </div>
                    </div>
                `;
                addTutorMessage(`Hello! Let's study the bonding between <b>${atom1.name}</b> and <b>${atom2.name}</b>.`);
            }
            
            safeSetTimeout(() => {
                stepElementType(atom1, atom2);
            }, 1000);
        }

        // --- ELEMENT TYPE SELECTION ---
        function stepElementType(a1, a2, prev1 = '', prev2 = '') {
            currentStepAttempts = (prev1 === '') ? 0 : currentStepAttempts;
            const isHomo = currentScenario.e1 === currentScenario.e2;
            
            if (prev1 === '') {
                addTutorMessage(`Before determining the type of bond, can you classify ${isHomo ? 'the element' : 'each element'}?`);
            }
            
            let html = `<div class="flex flex-col space-y-4 fade-in">`;
            
            html += `
                <div class="bg-slate-50 p-3 rounded border border-slate-200 font-sans">
                    <p class="font-bold text-indigo-700 mb-2">${a1.name}:</p>
                    <select id="elType1" class="w-full border border-slate-300 rounded p-2 focus:ring-2 outline-none text-sm bg-white text-slate-700">
                        <option value="">Select the element type...</option>
                        <option value="metal" ${prev1 === 'metal' ? 'selected' : ''}>Metal</option>
                        <option value="nonmetal" ${prev1 === 'nonmetal' ? 'selected' : ''}>Nonmetal</option>
                        <option value="metalloid" ${prev1 === 'metalloid' ? 'selected' : ''}>Metalloid</option>
                        <option value="noblegas" ${prev1 === 'noblegas' ? 'selected' : ''}>Noble gas</option>
                    </select>
                </div>
            `;

            if (!isHomo) {
                html += `
                    <div class="bg-slate-50 p-3 rounded border border-slate-200 font-sans">
                        <p class="font-bold text-teal-700 mb-2">${a2.name}:</p>
                        <select id="elType2" class="w-full border border-slate-300 rounded p-2 focus:ring-2 outline-none text-sm bg-white text-slate-700">
                            <option value="">Select the element type...</option>
                            <option value="metal" ${prev2 === 'metal' ? 'selected' : ''}>Metal</option>
                            <option value="nonmetal" ${prev2 === 'nonmetal' ? 'selected' : ''}>Nonmetal</option>
                            <option value="metalloid" ${prev2 === 'metalloid' ? 'selected' : ''}>Metalloid</option>
                            <option value="noblegas" ${prev2 === 'noblegas' ? 'selected' : ''}>Noble gas</option>
                        </select>
                    </div>
                `;
            }

            html += `<button onclick="checkElementType()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition-colors font-sans">Check</button></div>`;
            inputArea.innerHTML = html;
        }

        function checkElementType() {
            const isHomo = currentScenario.e1 === currentScenario.e2;
            const t1 = document.getElementById('elType1').value;
            const t2 = isHomo ? t1 : document.getElementById('elType2').value;

            if (!t1 || (!isHomo && !t2)) {
                addTutorMessage(`Please select a category for ${isHomo ? 'the element' : 'both elements'} before continuing.`);
                return;
            }

            currentStepAttempts++;
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            
            const typeLabels = {
                'metal': 'Metal',
                'nonmetal': 'Nonmetal',
                'metalloid': 'Metalloid',
                'noblegas': 'Noble gas'
            };

            inputArea.innerHTML = '';
            if(isHomo) {
                addUserMessage(`${a1.sym}: ${typeLabels[t1]}`);
            } else {
                addUserMessage(`${a1.sym}: ${typeLabels[t1]} | ${a2.sym}: ${typeLabels[t2]}`);
            }

            safeSetTimeout(() => {
                let errors = [];
                if (t1 !== a1.type) errors.push(`<b>${a1.name}</b>`);
                if (!isHomo && t2 !== a2.type) errors.push(`<b>${a2.name}</b>`);

                if (errors.length === 0) {
                    addTutorMessage(`<b class="text-red-600 font-bold">Excellent!</b> You have correctly classified ${isHomo ? 'the element' : 'both elements'}.`);
                    if (currentScenario.type === 'none') {
                        stepValence(a1, a2); 
                    } else {
                        stepDetermineBond(); 
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        if(isHomo) {
                            addTutorMessage(`You have used your 3 attempts. ${a1.name} is a <b class="text-red-600 font-bold">${typeLabels[a1.type]}</b>.`);
                        } else {
                            addTutorMessage(`You have used your 3 attempts. ${a1.name} is a <b class="text-red-600 font-bold">${typeLabels[a1.type]}</b> and ${a2.name} is a <b class="text-red-600 font-bold">${typeLabels[a2.type]}</b>.`);
                        }
                        safeSetTimeout(() => {
                            if (currentScenario.type === 'none') stepValence(a1, a2);
                            else stepDetermineBond();
                        }, 2500);
                    } else {
                        let hint = "Look at its position on the periodic table. Metals are on the left, nonmetals on the right, metalloids on the diagonal border, and noble gases in the last column.";
                        addTutorMessage(`Hmm, there's an error in the classification of ${errors.join(' and ')}. <br><br><b>Hint:</b> ${hint} Try again!`);
                        stepElementType(a1, a2, t1, isHomo ? '' : t2);
                    }
                }
            }, 800);
        }

        // --- DETERMINE BOND TYPE ---
        function stepDetermineBond() {
            currentStepAttempts = 0;
            safeSetTimeout(() => {
                addTutorMessage(`Based on the classification you just made, what <b>type of bond</b> will they form?`);
                
                inputArea.innerHTML = `
                    <div class="flex flex-col space-y-2 fade-in font-sans">
                        <select id="bondTypeSelect" class="border border-slate-300 rounded p-2 focus:ring-2 outline-none w-full text-sm bg-white text-slate-800">
                            <option value="">Select the bond type...</option>
                            <option value="ionic">Ionic</option>
                            <option value="covalent">Covalent</option>
                            <option value="metallic">Metallic</option>
                            <option value="none">Does not form a bond</option>
                        </select>
                        <button onclick="checkBond()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded transition-colors font-sans">Check Bond</button>
                    </div>
                `;
            }, 1000);
        }

        function checkBond() {
            const selectEl = document.getElementById('bondTypeSelect');
            const selectedType = selectEl.value;

            if (!selectedType) {
                addTutorMessage("Please select an option from the dropdown menu before checking.");
                return;
            }

            inputArea.innerHTML = '';
            const bondLabels = {
                'ionic': 'Ionic Bond',
                'covalent': 'Covalent Bond',
                'metallic': 'Metallic Bond',
                'none': 'No bond'
            };
            
            const displaySelectedType = selectedType;
            addUserMessage(bondLabels[displaySelectedType] || "Covalent");
            currentStepAttempts++;

            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isHomo = currentScenario.e1 === currentScenario.e2;
            const isMetal1 = a1.type === 'metal';
            const isMetal2 = a2.type === 'metal';
            
            let actualType = '';
            if (a1.type === 'noblegas' || a2.type === 'noblegas') actualType = 'none';
            else if (isMetal1 && isMetal2) actualType = 'metallic';
            else if (isMetal1 !== isMetal2) actualType = 'ionic';
            else actualType = 'covalent';

            const isCorrectBond = (selectedType === 'covalent' && (currentScenario.type === 'covalent' || currentScenario.type === 'covalent_atomic')) ||
                                 (selectedType === currentScenario.type);

            safeSetTimeout(() => {
                if (isCorrectBond) {
                    if (currentScenario.type === 'none') {
                        addTutorMessage(`<b class="text-red-600 font-bold">Correct!</b> It's a case of <b class="text-red-600 font-bold">${bondLabels[selectedType]}</b>, because having a full outer shell with ${a1.val} valence e⁻, it has a <b>stable electron configuration</b> and doesn't need to bond with other atoms.`);
                    } else {
                        addTutorMessage(`<b class="text-red-600 font-bold">Correct!</b> It's a case of a <b class="text-red-600 font-bold">${bondLabels[selectedType]}</b>.`);
                    }
                    
                    if (currentScenario.type === 'none') {
                        safeSetTimeout(() => stepAtomsBalance(a1, a2), 2500); 
                    } else {
                        stepValence(a1, a2);
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        let reason = "";
                        if (actualType === 'none') {
                            reason = "because noble gases already comply with the octet rule (or duet for Helium) by having the necessary electrons in their outer shell to be completely stable";
                        } else if (actualType === 'metallic') {
                            reason = "because it is the massive bonding between atoms of the same metal";
                        } else if (currentScenario.type === 'covalent_atomic') {
                            reason = "because it is the bond between nonmetals/metalloids that will share electrons, although in this case they extend forming a giant network";
                        } else if (isHomo) {
                            reason = "because it is the bond between atoms of the same nonmetal";
                        } else if (actualType === 'ionic') {
                            reason = `because it is the bond between a metal (${isMetal1 ? a1.name : a2.name}) and a nonmetal (${!isMetal1 ? a1.name : a2.name})`;
                        } else {
                            reason = "because it is the bond between two nonmetals (or a nonmetal and a metalloid)";
                        }
                        const expectedLabel = (currentScenario.type === 'covalent_atomic') ? 'Covalent Bond' : (bondLabels[currentScenario.type] || 'Bond');
                        addTutorMessage(`You have used your 3 attempts. The correct answer is <b class="text-red-600 font-bold">${expectedLabel}</b>, ${reason}.`);
                        safeSetTimeout(() => {
                            if (currentScenario.type === 'none') stepAtomsBalance(a1, a2);
                            else stepValence(a1, a2);
                        }, 2500);
                    } else {
                        let hint = "";
                        if (currentStepAttempts === 1) {
                            hint = `That is not correct. Try again.`;
                        } else {
                            if (actualType === 'none') {
                                hint = `<b>Hint:</b> Remember that noble gases have a unique feature regarding their outer electron shell.`;
                            } else if (actualType === 'metallic') {
                                hint = `<b>Hint:</b> Remember what type of bond is formed when grouping pure atoms of the same metal.`;
                            } else if (currentScenario.type === 'covalent_atomic') {
                                hint = `<b>Hint:</b> Remember the bonding between nonmetals/metalloids like carbon or silicon.`;
                            } else if (isHomo) {
                                hint = `<b>Hint:</b> Remember the bonding between atoms of the same nonmetallic element.`;
                            } else {
                                hint = actualType === 'ionic' ? 
                                    `<b>Hint:</b> Remember the bond between a metal (${isMetal1 ? a1.name : a2.name}) and a nonmetal (${!isMetal1 ? a1.name : a2.name}).` : 
                                    `<b>Hint:</b> Remember the bond between two nonmetals (or a nonmetal and a metalloid).`;
                            }
                        }
                        
                        addTutorMessage(`${hint}`);
                        safeSetTimeout(() => {
                            inputArea.innerHTML = `
                                <div class="flex flex-col space-y-2 fade-in font-sans">
                                    <select id="bondTypeSelect" class="border border-slate-300 rounded p-2 focus:ring-2 outline-none w-full text-sm bg-white text-slate-800">
                                        <option value="">Select the bond type...</option>
                                        <option value="ionic" ${selectedType === 'ionic' ? 'selected' : ''}>Ionic</option>
                                        <option value="covalent" ${selectedType === 'covalent' ? 'selected' : ''}>Covalent</option>
                                        <option value="metallic" ${selectedType === 'metallic' ? 'selected' : ''}>Metallic</option>
                                        <option value="none" ${selectedType === 'none' ? 'selected' : ''}>Does not form a bond</option>
                                    </select>
                                    <button onclick="checkBond()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded transition-colors font-sans">Check Bond</button>
                                </div>
                            `;
                        }, 500);
                    }
                }
            }, 600);
        }

        // --- GET VALENCE AND CONFIGURATION ---
        function stepValence(a1, a2, prev = {}) {
            currentStepAttempts = prev.reset ? 0 : currentStepAttempts;
            if(!prev.reset && Object.keys(prev).length === 0) currentStepAttempts = 0; 
            const isHomo = currentScenario.e1 === currentScenario.e2;

            safeSetTimeout(() => {
                if (currentStepAttempts === 0) {
                    if (isHomo) {
                        addTutorMessage(`Now, let's deduce its configuration. For the element, indicate its <b>period (P)</b>, <b>group (G)</b>, its <b>electron shell configuration</b>, and its <b>valence e⁻</b>.`);
                    } else {
                        addTutorMessage(`Now, let's deduce their configuration. For each element, indicate its <b>period (P)</b>, <b>group (G)</b>, its <b>electron shell configuration</b>, and its <b>valence e⁻</b>.`);
                    }
                }
                
                let html = `<div class="flex flex-col space-y-3 fade-in text-sm font-sans">`;
                
                html += `
                    <div class="bg-slate-50 p-2 rounded border border-slate-200">
                        <div class="font-bold text-indigo-700 mb-2">${a1.sym} (Z = ${a1.z})</div>
                        <div class="flex items-center flex-wrap gap-2 text-slate-800">
                            <label class="font-semibold text-slate-600">P:</label> 
                            <input type="number" id="p1" value="${prev.p1 || ''}" class="border border-slate-300 rounded p-1 w-12 text-center focus:ring-2 outline-none bg-white text-slate-800">

                if (!isHomo) {

                                <div class="ml-auto flex items-center bg-red-50 p-1 rounded border border-red-200">
                                    <label class="font-bold text-red-600 mr-1 text-xs">val e⁻:</label> 
                                    <input type="number" id="val2" value="${prev.v2 || ''}" min="1" max="8" class="border border-red-300 rounded p-1 w-12 text-center focus:ring-2 outline-none bg-white text-slate-800">

                }

                html += `<button onclick="checkValence()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded mt-2 transition-colors font-sans">Check Data</button></div>`;
                inputArea.innerHTML = html;
            }, 1000);
        }

        function checkValence() {
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isHomo = currentScenario.e1 === currentScenario.e2;

            const rawP1 = document.getElementById('p1').value.trim();
            const rawG1 = document.getElementById('g1').value.trim();
            const rawConf1 = document.getElementById('conf1').value.trim();
            const rawV1 = document.getElementById('val1').value.trim();

            const rawP2 = isHomo ? rawP1 : document.getElementById('p2').value.trim();
            const rawG2 = isHomo ? rawG1 : document.getElementById('g2').value.trim();
            const rawConf2 = isHomo ? rawConf1 : document.getElementById('conf2').value.trim();
            const rawV2 = isHomo ? rawV1 : document.getElementById('val2').value.trim();

            if (!rawP1 || !rawG1 || !rawConf1 || !rawV1 || (!isHomo && (!rawP2 || !rawG2 || !rawConf2 || !rawV2))) {
                addTutorMessage("Please fill in all the fields before checking the data.");
                return; 
            }

            currentStepAttempts++;

            const p1 = parseInt(rawP1) || 0;
            const g1 = parseInt(rawG1) || 0;
            const conf1Raw = rawConf1;
            const v1 = parseInt(rawV1) || 0;

            const p2 = isHomo ? p1 : (parseInt(rawP2) || 0);
            const g2 = isHomo ? g1 : (parseInt(rawG2) || 0);
            const conf2Raw = isHomo ? conf1Raw : rawConf2;
            const v2 = isHomo ? v1 : (parseInt(rawV2) || 0);

            const cleanConf = (str) => str.replace(/[\(\)\s]/g, '').replace(/[-.]/g, ',');
            
            const conf1 = cleanConf(conf1Raw);
            const conf2 = cleanConf(conf2Raw);
            const expectedConf1 = cleanConf(a1.conf);
            const expectedConf2 = cleanConf(a2.conf);

            inputArea.innerHTML = '';
            if (isHomo) {
                addUserMessage(`${a1.sym} -> P:${p1} | G:${g1} | Conf:${conf1Raw} | ${v1} e⁻`);
            } else {
                addUserMessage(`${a1.sym} -> P:${p1} | G:${g1} | Conf:${conf1Raw} | ${v1} e⁻`);
                addUserMessage(`${a2.sym} -> P:${p2} | G:${g2} | Conf:${conf2Raw} | ${v2} e⁻`);
            }

            safeSetTimeout(() => {
                let errors = [];
                let errA1 = [];
                let hasPeriodErr = false, hasGroupErr = false, hasConfErr = false, hasValErr = false;

                if (p1 !== a1.p) { errA1.push("period"); hasPeriodErr = true; }
                if (g1 !== a1.g) { errA1.push("group"); hasGroupErr = true; }
                if (conf1 !== expectedConf1) { errA1.push("configuration"); hasConfErr = true; }
                if (v1 !== a1.val) { errA1.push("valence e⁻"); hasValErr = true; }
                if (errA1.length > 0) errors.push(`<b class="text-red-600 font-bold">${a1.name}</b> (${errA1.join(', ')})`);

                if (!isHomo) {
                    let errA2 = [];
                    if (p2 !== a2.p) { errA2.push("period"); hasPeriodErr = true; }
                    if (g2 !== a2.g) { errA2.push("group"); hasGroupErr = true; }
                    if (conf2 !== expectedConf2) { errA2.push("configuration"); hasConfErr = true; }
                    if (v2 !== a2.val) { errA2.push("valence e⁻"); hasValErr = true; }
                    if (errA2.length > 0) errors.push(`<b class="text-red-600 font-bold">${a2.name}</b> (${errA2.join(', ')})`);
                }

                if (errors.length === 0) {
                    addTutorMessage('<b class="text-red-600 font-bold">Flawless!</b> You have correctly identified the positions on the table, the shell structure, and the valence electrons.');
                    if (currentScenario.type === 'none') {
                        stepDetermineBond(); 
                    } else {
                        stepElectrons(a1, a2); 
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        if (isHomo) {
                            addTutorMessage(`You have used your 3 attempts. Here is the correct data: <br><br><b class="text-red-600 font-bold">${a1.sym}: P:${a1.p}, G:${a1.g}, Conf:${a1.conf}, ${a1.val} val e⁻</b>`);
                        } else {
                            addTutorMessage(`You have used your 3 attempts. Here is the correct data: <br><br><b class="text-red-600 font-bold">${a1.sym}: P:${a1.p}, G:${a1.g}, Conf:${a1.conf}, ${a1.val} val e⁻</b><br><b class="text-red-600 font-bold">${a2.sym}: P:${a2.p}, G:${a2.g}, Conf:${a2.conf}, ${a2.val} val e⁻</b>`);
                        }
                        safeSetTimeout(() => {
                            if (currentScenario.type === 'none') stepDetermineBond();
                            else stepElectrons(a1, a2);
                        }, 2500);
                    } else {
                        if (currentStepAttempts === 1) {
                            addTutorMessage(`Be careful, there is an error in ${errors.join(' and ')}. Calmly review its position on the periodic table and remember the rule to locate the outer shell electrons.`);
                        } else {
                            let dynamicHints = [];
                            
                            if (hasPeriodErr && hasGroupErr) {
                                dynamicHints.push("• For the <b>Group and Period</b>, you must know the Periodic Table: the <b>Period</b> is the horizontal row number and the <b>Group</b> is the vertical column number.");
                            } else if (hasPeriodErr) {
                                dynamicHints.push("• For the <b>Period</b>, you must know the Periodic Table: it corresponds to the horizontal row number.");
                            } else if (hasGroupErr) {
                                dynamicHints.push("• For the <b>Group</b>, you must know the Periodic Table: it corresponds to the vertical column number.");
                            }
                            
                            if (hasConfErr) {
                                dynamicHints.push("• In the <b>electron configuration</b>, the total number of e⁻ equals the number of p⁺ (the atomic number Z) for the neutral atom. Remember the number of e⁻ per shell according to the Bohr model. Furthermore, the <b>Period</b> indicates the total number of electron shells and the units digit of the <b>Group</b> (for representative elements) gives you the electrons in the outer shell.");
                            }
                            
                            if (hasValErr) {
                                dynamicHints.push("• The <b>valence e⁻</b> are the electrons located in the outermost shell.");
                            }

                            addTutorMessage(`Be careful, there is an error in ${errors.join(' and ')}. <br><br><b>Hints:</b> <br>${dynamicHints.join('<br>')}`);
                        }
                        
                        stepValence(a1, a2, { p1: rawP1, g1: rawG1, conf1: conf1Raw, v1: rawV1, p2: rawP2, g2: rawG2, conf2: conf2Raw, v2: rawV2 });
                    }
                }
            }, 800);
        }

        // --- DETERMINE VALENCE ELECTRON CHANGES ---
        function stepElectrons(a1, a2, prev = {}) {
            if(Object.keys(prev).length === 0) currentStepAttempts = 0;
            const isHomo = currentScenario.e1 === currentScenario.e2;

            safeSetTimeout(() => {
                if (currentStepAttempts === 0) {
                    if (isHomo) {
                        addTutorMessage(`Applying the <b>Octet (or Duet) Rule</b> to be stable, what does the element need to do with its valence electrons?`);
                    } else {
                        addTutorMessage(`Applying the <b>Octet (or Duet) Rule</b> to be stable, what does each atom need to do with its valence electrons?`);
                    }
                }
                
                let html = `<div class="flex flex-col space-y-3 fade-in text-sm font-sans text-slate-800">`;
                
                html += `
                    <div class="bg-slate-50 p-3 rounded border border-slate-200">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="font-bold text-indigo-700 w-8">${a1.sym}:</span>
                            <select id="action1" class="border border-slate-300 rounded p-1 flex-1 focus:ring-2 outline-none bg-white text-slate-800">
                                <option value="">Select...</option>
                                <option value="loses" ${prev.a1 === 'loses' ? 'selected' : ''}>Loses</option>
                                <option value="gains" ${prev.a1 === 'gains' ? 'selected' : ''}>Gains</option>
                                <option value="shares" ${prev.a1 === 'shares' ? 'selected' : ''}>Shares</option>
                            </select>
                            <input type="number" id="ecount1" value="${prev.c1 || ''}" min="1" max="8" class="border border-slate-300 rounded p-1 w-12 text-center focus:ring-2 outline-none bg-white text-slate-800">
                            <span class="text-slate-600 font-semibold">e⁻</span>
                        </div>
                `;

                if (!isHomo) {
                    html += `
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-teal-700 w-8">${a2.sym}:</span>
                            <select id="action2" class="border border-slate-300 rounded p-1 flex-1 focus:ring-2 outline-none bg-white text-slate-800">
                                <option value="">Select...</option>
                                <option value="loses" ${prev.a2 === 'loses' ? 'selected' : ''}>Loses</option>
                                <option value="gains" ${prev.a2 === 'gains' ? 'selected' : ''}>Gains</option>
                                <option value="shares" ${prev.a2 === 'shares' ? 'selected' : ''}>Shares</option>
                            </select>
                            <input type="number" id="ecount2" value="${prev.c2 || ''}" min="1" max="8" class="border border-slate-300 rounded p-1 w-12 text-center focus:ring-2 outline-none bg-white text-slate-800">
                            <span class="text-slate-600 font-semibold">e⁻</span>
                        </div>
                    `;
                }

                html += `</div>
                    <button onclick="checkElectrons()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded mt-2 transition-colors font-sans">Verify Stability</button>
                </div>`;
                
                inputArea.innerHTML = html;
            }, 1000);
        }

        function checkElectrons() {
            currentStepAttempts++;
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isIonic = currentScenario.type === 'ionic';
            const isMetallic = currentScenario.type === 'metallic';
            const isHomo = currentScenario.e1 === currentScenario.e2;

            const action1 = document.getElementById('action1').value;
            const ecount1 = parseInt(document.getElementById('ecount1').value) || 0;
            
            const action2 = isHomo ? action1 : document.getElementById('action2').value;
            const ecount2 = isHomo ? ecount1 : (parseInt(document.getElementById('ecount2').value) || 0);

            inputArea.innerHTML = '';
            if (isHomo) {
                addUserMessage(`${a1.sym}: ${action1 || '?'} ${ecount1} e⁻`);
            } else {
                addUserMessage(`${a1.sym}: ${action1 || '?'} ${ecount1} e⁻ | ${a2.sym}: ${action2 || '?'} ${ecount2} e⁻`);
            }

            const expected1 = {
                action: (isIonic || isMetallic) ? (a1.type === 'metal' ? 'loses' : 'gains') : 'shares',
                count: a1.type === 'metal' ? a1.val : (a1.sym === 'H' ? 1 : (8 - a1.val))
            };
            const expected2 = {
                action: (isIonic || isMetallic) ? (a2.type === 'metal' ? 'loses' : 'gains') : 'shares',
                count: a2.type === 'metal' ? a2.val : (a2.sym === 'H' ? 1 : (8 - a2.val))
            };

            const verbMap = { 'loses': 'lose', 'gains': 'gain', 'shares': 'share' };

            safeSetTimeout(() => {
                let errors = [];
                if (action1 !== expected1.action || ecount1 !== expected1.count) errors.push(`what happens to <b>${a1.sym}</b>`);
                if (!isHomo && (action2 !== expected2.action || ecount2 !== expected2.count)) errors.push(`what happens to <b>${a2.sym}</b>`);

                if (errors.length === 0) {
                    if (isIonic) {
                        addTutorMessage(`<b class="text-red-600 font-bold">Very good!</b> In this ionic bond, the metal loses its electrons to form cations and the nonmetal gains them to form stable anions.`);
                        stepBuildIons(a1, a2);
                    } else if (isMetallic) {
                        addTutorMessage(`<b class="text-red-600 font-bold">Very good!</b> In the metallic bond, the metal cations are strongly held together thanks to the delocalized electrons.`);
                        stepBuildIons(a1, a2);
                    } else {
                        if (isHomo) {
                            addTutorMessage(`<b class="text-red-600 font-bold">Exactly!</b> Being nonmetallic atoms, they share their valence electrons to complete their respective outer shells.`);
                        } else {
                            addTutorMessage(`<b class="text-red-600 font-bold">Exactly!</b> Being both nonmetals, they share valence electrons to complete the octet (or duet).`);
                        }
                        stepAtomsBalance(a1, a2);
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        if (isHomo) {
                            addTutorMessage(`You have used your 3 attempts. The correct deduction is:<br><br><b>${a1.sym}</b> needs to <b class="text-red-600 font-bold">${verbMap[expected1.action]} ${expected1.count} e⁻</b>.`);
                        } else {
                            addTutorMessage(`You have used your 3 attempts. The correct deduction is:<br><br><b>${a1.sym}</b> needs to <b class="text-red-600 font-bold">${verbMap[expected1.action]} ${expected1.count} e⁻</b>.<br><b>${a2.sym}</b> needs to <b class="text-red-600 font-bold">${verbMap[expected2.action]} ${expected2.count} e⁻</b>.`);
                        }
                        safeSetTimeout(() => {
                            if (isIonic || isMetallic) stepBuildIons(a1, a2);
                            else stepAtomsBalance(a1, a2);
                        }, 2500);
                    } else {
                        let hint = "";
                        
                        const isAct1Wrong = action1 !== expected1.action;
                        const isQty1Wrong = action1 === expected1.action && ecount1 !== expected1.count;
                        const isAct2Wrong = !isHomo && (action2 !== expected2.action);
                        const isQty2Wrong = !isHomo && (action2 === expected2.action && ecount2 !== expected2.count);

                        const hasActionError = isAct1Wrong || isAct2Wrong;
                        const hasOnlyQtyError = !hasActionError && (isQty1Wrong || isQty2Wrong);

                        if (currentStepAttempts === 1) {
                            if (hasActionError) {
                                hint = "Check if the action you selected (loses, gains, or shares) is correct depending on whether the element is a metal or a nonmetal, and the type of bond involved.";
                            } else if (hasOnlyQtyError) {
                                hint = "You got the behavior right (loses/gains/shares)! However, the number of electrons you indicated is not correct. Review the valence electrons each element has in its outer shell and how many it needs to complete it.";
                            }
                        } else {
                            if (hasActionError) {
                                hint = (isIonic || isMetallic) ? 
                                    "Remember: In ionic or metallic bonds, metals always <b>lose</b> their valence electrons, while nonmetals <b>gain</b> them to achieve stability." :
                                    "Remember: In covalent bonds, nonmetals <b>share</b> electrons to complete their outer shell together.";
                            } else if (hasOnlyQtyError) {
                                let specificTips = [];
                                if (isQty1Wrong) {
                                    if (a1.type === 'metal') {
                                        specificTips.push(`The metal <b>${a1.sym}</b> must lose exactly <b>all</b> of its valence electrons (i.e., ${expected1.count} e⁻).`);
                                    } else {
                                        specificTips.push(`The nonmetal <b>${a1.sym}</b> must gain or share the exact amount of electrons needed to reach 8 (or 2 in the case of H, Li, or Be).`);
                                    }
                                }
                                if (isQty2Wrong) {
                                    if (a2.type === 'metal') {
                                        specificTips.push(`The metal <b>${a2.sym}</b> must lose exactly <b>all</b> of its valence electrons (i.e., ${expected2.count} e⁻).`);
                                    } else {
                                        specificTips.push(`The nonmetal <b>${a2.sym}</b> must gain or share the exact amount of electrons needed to reach 8 (or 2 in the case of H, Li, or Be).`);
                                    }
                                }
                                hint = `<b>Counting hint:</b><br>${specificTips.join('<br>')}`;
                            }
                        }
                        
                        addTutorMessage(`There is a detail to review in ${errors.join(' and ')}. <br><br>${hint}`);
                        stepElectrons(a1, a2, {a1: action1, c1: ecount1, a2: action2, c2: ecount2});
                    }
                }
            }, 800);
        }

        // --- CONSTRUCT IONS (IONIC / METALLIC ONLY) ---
        function stepBuildIons(a1, a2, isRetry = false) {
            if (!isRetry) currentStepAttempts = 0;
            const isMetallic = currentScenario.type === 'metallic';
            
            safeSetTimeout(() => {
                if (!isRetry) {
                    if (isMetallic) {
                        addTutorMessage("Now let's build the resulting cation. Write the ion's charge as a superscript using the two boxes.");
                    } else {
                        addTutorMessage("Now let's build the resulting ions. Write the charge of each ion as a superscript using the two boxes.");
                    }
                }

                let html = `
                    <div class="flex flex-col space-y-4 fade-in font-sans text-slate-800">
                        <div class="flex justify-around items-center bg-slate-50 p-6 rounded border border-slate-200">
                            <!-- Ion 1 -->
                            <div class="flex items-start text-4xl font-bold font-serif text-indigo-700 relative">
                                <span>${a1.sym}</span>
                                <div class="flex absolute -right-12 -top-2">
                                    <input type="text" id="i1_b1" maxlength="1" class="w-6 h-6 text-sm text-center border border-slate-400 rounded-l focus:outline-none focus:ring-2 focus:ring-indigo-500 font-sans text-slate-800 bg-white">
                                    <input type="text" id="i1_b2" maxlength="1" class="w-6 h-6 text-sm text-center border-y border-r border-slate-400 rounded-r focus:outline-none focus:ring-2 focus:ring-indigo-500 font-sans text-slate-800 bg-white">
                                </div>
                            </div>`;
                            
                if (!isMetallic) {
                    html += `
                            <!-- Ion 2 -->
                            <div class="flex items-start text-4xl font-bold font-serif text-teal-700 relative ml-8">
                                <span>${a2.sym}</span>
                                <div class="flex absolute -right-12 -top-2">
                                    <input type="text" id="i2_b1" maxlength="1" class="w-6 h-6 text-sm text-center border border-slate-400 rounded-l focus:outline-none focus:ring-2 focus:ring-teal-500 font-sans text-slate-800 bg-white">
                                    <input type="text" id="i2_b2" maxlength="1" class="w-6 h-6 text-sm text-center border-y border-r border-slate-400 rounded-r focus:outline-none focus:ring-2 focus:ring-teal-500 font-sans text-slate-800 bg-white">
                                </div>
                            </div>`;
                }

                html += `
                        </div>
                        <button onclick="checkBuildIons()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition-colors font-sans">Form Ions</button>
                    </div>
                `;
                inputArea.innerHTML = html;
            }, isRetry ? 100 : 1000);
        }

        function checkBuildIons() {
            currentStepAttempts++;
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isMetallic = currentScenario.type === 'metallic';
            
            const i1b1 = document.getElementById('i1_b1').value.trim();
            const i1b2 = document.getElementById('i1_b2').value.trim();
            const i2b1 = isMetallic ? '' : document.getElementById('i2_b1').value.trim();
            const i2b2 = isMetallic ? '' : document.getElementById('i2_b2').value.trim();

            inputArea.innerHTML = '';
            if (isMetallic) {
                addUserMessage(`${a1.sym}<sup>${i1b1}${i1b2}</sup>`);
            } else {
                addUserMessage(`${a1.sym}<sup>${i1b1}${i1b2}</sup> and ${a2.sym}<sup>${i2b1}${i2b2}</sup>`);
            }

            const expectedCharge1 = a1.val; 
            const expectedCharge2 = isMetallic ? 0 : (a2.sym === 'H' ? 1 : 8 - a2.val); 
            
            const validateIon = (b1, b2, charge, sign) => {
                if (charge === 1) {
                    if ((b1 === sign && b2 === '') || (b1 === '' && b2 === sign)) return {ok: true};
                    if (b1 === '1' || b2 === '1') return {ok: false, hint: 'number1'};
                    return {ok: false, hint: 'wrong_sign'};
                } else {
                    if (b1 === charge.toString() && b2 === sign) return {ok: true};
                    if (b1 === sign && b2 === charge.toString()) return {ok: false, hint: 'reversed'};
                    return {ok: false, hint: 'wrong_val'};
                }
            };

            const res1 = validateIon(i1b1, i1b2, expectedCharge1, '+');
            const res2 = isMetallic ? {ok: true} : validateIon(i2b1, i2b2, expectedCharge2, '-');

            safeSetTimeout(() => {
                if (res1.ok && res2.ok) {
                    if (isMetallic) {
                        addTutorMessage(`<b class="text-red-600 font-bold">Perfect!</b> You have built the metallic cation correctly: <b class="text-red-600 font-bold">${a1.sym}<sup>${expectedCharge1===1?'+':expectedCharge1+'+'}</sup></b>.`);
                        stepMetallicExplanation();
                    } else {
                        addTutorMessage(`<b class="text-red-600 font-bold">Perfect!</b> You have built the ions correctly: <b class="text-red-600 font-bold">${a1.sym}<sup>${expectedCharge1===1?'+':expectedCharge1+'+'}</sup></b> and <b class="text-red-600 font-bold">${a2.sym}<sup>${expectedCharge2===1?'-':expectedCharge2+'-'}</sup></b>.`);
                        stepAtomsBalance(a1, a2);
                    }
                } else {
                    if (currentStepAttempts >= 3) {
                        let expected1 = expectedCharge1 === 1 ? '+' : `${expectedCharge1}+`;
                        if (isMetallic) {

                    } else {

        // --- ATOM BALANCE ---

        function checkBalance() {
            const isHomo = currentScenario.e1 === currentScenario.e2;
            const isIonic = currentScenario.type === 'ionic';
            const isNone = currentScenario.type === 'none';
            const isMetallic = currentScenario.type === 'metallic';
            const isCovalentAtomic = currentScenario.type === 'covalent_atomic';

            const sym1Raw = document.getElementById('sym1').value.trim();
            const sym2Raw = isHomo ? '' : document.getElementById('sym2').value.trim();
            const q1 = parseInt(document.getElementById('qty1').value) || 1;
            const q2 = isHomo ? 0 : parseInt(document.getElementById('qty2').value || 1);

            if (!sym1Raw || (!isHomo && !sym2Raw)) {
                addTutorMessage("Please fill in the boxes with the chemical symbols before checking.");
                return;
            }

            currentStepAttempts++;
            
            inputArea.innerHTML = '';
            
            let displayForm = isHomo
                ? `${sym1Raw}${q1 > 1 ? `<sub>${q1}</sub>` : ''}`
                : `${sym1Raw}${q1 > 1 ? `<sub>${q1}</sub>` : ''}${sym2Raw}${q2 > 1 ? `<sub>${q2}</sub>` : ''}`;
            
            addUserMessage(`Proposed formula: ${displayForm}`);

            const expectedSym1 = currentScenario.e1;
            const expectedSym2 = currentScenario.e2;
            let expectedQty1 = 1;
            let expectedQty2 = 0;
            
            if (isCovalentAtomic && isHomo) {
                expectedQty1 = 1;
            } else if (isHomo) {
                expectedQty1 = (currentScenario.c1 || 1) + (currentScenario.c2 || 0);
            } else {
                expectedQty1 = currentScenario.c1;
                expectedQty2 = currentScenario.c2;
            }

            safeSetTimeout(() => {
                let isOrderReversed = false;
                let areSymsWrong = false;
                let areQtysWrong = false;
                let caseError = false;

                const sym1Lo = sym1Raw.toLowerCase();
                const sym2Lo = sym2Raw.toLowerCase();
                const expected1Lo = expectedSym1.toLowerCase();
                const expected2Lo = expectedSym2.toLowerCase();

                if (isHomo) {
                    if (sym1Lo !== expected1Lo) {
                        areSymsWrong = true;
                    } else {
                        if (sym1Raw !== expectedSym1) {
                            caseError = true;
                        }
                        if (q1 !== expectedQty1) {
                            areQtysWrong = true;
                        }
                    }
                } else {
                    const matchDirectLo = (sym1Lo === expected1Lo && sym2Lo === expected2Lo);
                    const matchReverseLo = (sym1Lo === expected2Lo && sym2Lo === expected1Lo);

                    if (!matchDirectLo && !matchReverseLo) {
                        areSymsWrong = true;
                    } else if (matchReverseLo) {
                        isOrderReversed = true;
                        if (sym1Raw !== expectedSym2 || sym2Raw !== expectedSym1) {
                            caseError = true;
                        }
                        if (q1 !== expectedQty2 || q2 !== expectedQty1) {
                            areQtysWrong = true;
                        }
                    } else {
                        if (sym1Raw !== expectedSym1 || sym2Raw !== expectedSym2) {
                            caseError = true;
                        }
                        if (q1 !== expectedQty1 || q2 !== expectedQty2) {
                            areQtysWrong = true;
                        }
                    }
                }

                let correctForm = isHomo
                    ? `${expectedSym1}${expectedQty1 > 1 ? `<sub>${expectedQty1}</sub>` : ''}`
                    : `${expectedSym1}${expectedQty1 > 1 ? `<sub>${expectedQty1}</sub>` : ''}${expectedSym2}${expectedQty2 > 1 ? `<sub>${expectedQty2}</sub>` : ''}`;

                const proceedToNextStep = (finalForm) => {
                    if (isIonic || isNone || isMetallic) stepMassCalculation(currentScenario.c1, currentScenario.c2);
                    else stepSubstanceOrCompound(finalForm);
                };

                if (!isOrderReversed && !areSymsWrong && !areQtysWrong && !caseError) {
                    addTutorMessage(`<b class="text-red-600 font-bold">Excellent deduction!</b> The formula obtained is <b class="text-red-600 font-bold">${displayForm}</b>.`);
                    proceedToNextStep(displayForm);
                } else {
                    if (currentStepAttempts >= 3) {
                        let totalAtoms = expectedQty1 + expectedQty2;
                        let msg = isHomo
                            ? `You have used your 3 attempts. For this substance we need ${expectedQty1} atom${expectedQty1 > 1 ? 's' : ''} of ${expectedSym1}.<br>The correct formula is <b class="text-red-600 font-bold">${correctForm}</b>.`
                            : `You have used your 3 attempts. To balance the bond we need ${expectedQty1} of ${expectedSym1} and ${expectedQty2} of ${expectedSym2}.<br>The correct formula is <b class="text-red-600 font-bold">${correctForm}</b>.`;
                        addTutorMessage(msg);
                        safeSetTimeout(() => proceedToNextStep(correctForm), 2500);
                    } else {
                        let hint = "Almost there. We need to balance it correctly. Try again.";
                        
                        if (currentStepAttempts === 1) {
                            if (areSymsWrong) {
                                hint = isHomo 
                                    ? `Check the chemical symbol. It does not match the element we are working with.`
                                    : `Check the chemical symbols. One of the ones you wrote does not correspond to the elements we are joining.`;
                            } else if (caseError) {
                                hint = "<b>Check the writing:</b> Be careful with how you write the chemical symbols of the elements. Remember to use the proper capitalization to start.";
                            } else if (isOrderReversed) {
                                hint = "<b>Check the order:</b> The symbols for the elements are correct, but subtly look at the order in which they are placed. Which one should go on the left?";
                            } else if (areQtysWrong) {
                                hint = "<b>Check the proportion:</b> The symbols and their order are correct. Subtly evaluate the numerical proportion in which they combine so that the substance is stable and neutral.";
                                if (isNone) {
                                    hint += "<br><br><b>Hint:</b> Remember that these atoms are already stable.";
                                } else if (isMetallic || isCovalentAtomic) {
                                    hint += "<br><br><b>Hint:</b> Remember that these substances form immense giant networks, so their formula is simplified to indicate the minimum unit of representation.";
                                } else if (isHomo) {
                                    hint += "<br><br><b>Hint:</b> Think about how many electrons a single one needs and how many can be provided between them to stabilize forming a pair.";
                                } else if (!isIonic) {
                                    hint += "<br><br><b>Hint:</b> The atom that needs to share <b>fewer</b> electrons will be the most numerous.";
                                } else {
                                    hint += "<br><br><b>Hint:</b> The atom that exchanges <b>fewer</b> electrons will be needed in greater quantity.";
                                }
                            }
                        } else if (currentStepAttempts === 2) {
                            if (areSymsWrong) {
                                hint = isHomo 
                                    ? `Make sure to write the correct symbol for the atom involved (${expectedSym1}).` 
                                    : `Make sure to use the correct symbols of the elements we are bonding (${expectedSym1} and ${expectedSym2}).`;
                            } else if (caseError) {
                                hint = "<b>Capitalization error:</b> Chemical symbols from the periodic table are case-sensitive. The first letter must ALWAYS be uppercase and the second (if any) ALWAYS lowercase. For example: write <b>Ba</b> (not 'ba' or 'BA') or <b>Cl</b> (not 'cl' or 'CL').";
                            } else if (isOrderReversed) {
                                hint = "<b>Order rule (IUPAC):</b> When writing a chemical formula, the least electronegative element (the most metallic or cation) is always placed on the left, and the most electronegative (nonmetal or anion) on the right. Invert them!";
                            } else if (areQtysWrong) {
                                hint = "<b>Proportion error:</b> You have not balanced the quantities of atoms well.";
                                if (isNone) {
                                    hint += "<br><br><b>Trick:</b> Remember that these atoms are already stable and do not bond (proportion = 1).";
                                } else if (isMetallic || (isCovalentAtomic && isHomo)) {
                                    hint += "<br><br><b>Trick:</b> Their formula is represented exactly the same as their isolated neutral chemical symbol (proportion = 1).";
                                } else if (isCovalentAtomic && !isHomo) {
                                    hint += "<br><br><b>Trick:</b> Think that for every Silicon atom (which requires sharing 4 electrons) we will need the corresponding Oxygen/Carbon atoms according to the proportion.";
                                } else if (isHomo) {
                                    hint += "<br><br><b>Trick:</b> The simple substances of these nonmetals are always diatomic.";
                                } else {
                                    hint += "<br><br><b>Trick:</b> Try crossing the numbers (cross rule). The electrons the first one needs, put them as the number of atoms of the second.";
                                }
                            }
                        }
                        
                        addTutorMessage(hint);
                        stepAtomsBalance(elementsDB[currentScenario.e1], elementsDB[currentScenario.e2], true);
                    }
                }
            }, 600);
        }

        // --- SUBSTANCE VS COMPOUND ---
        function stepSubstanceOrCompound(displayForm, isRetry = false) {
            if (!isRetry) currentStepAttempts = 0;
            
            safeSetTimeout(() => {
                if (!isRetry) {
                    addTutorMessage(`This chemical substance we just formed (<b>${displayForm}</b>), is it a simple substance or a chemical compound?`);
                }

                inputArea.innerHTML = `
                    <div class="flex flex-col space-y-2 fade-in font-sans">

        function checkSubstanceOrCompound(displayForm) {

                        safeSetTimeout(() => proceedToNextStep(), 2000);
                    } else {
                        let hint = "";
                        if (isNone) {
                            hint = "Remember that this substance is formed by atoms of the same chemical element.";
                        } else if (isHomo || (isCovalentAtomic && currentScenario.e1 === currentScenario.e2)) {
                            hint = "Remember that this substance is formed by atoms of the same chemical element.";
                        } else {
                            hint = "Remember that this substance is formed by the union of atoms from different chemical elements.";
