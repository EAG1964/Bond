        // --- INTERACTIVE LEWIS BUILDER ---
        function startInteractiveLewis(displayForm) {
            currentStepAttempts = 0;
            safeSetTimeout(() => {
                if (currentScenario.type === 'covalent_atomic') {
                    addTutorMessage(`Since it is a <b>giant covalent network</b>, build the <b>basic structural unit</b> (the central core surrounded by its immediate neighbors) on the whiteboard.<br><br><b>Note:</b> As peripheral atoms will connect to others in the network, <b>leave them only with the strictly necessary electrons and bonds for this unit</b> (do not try to close their octet with invented lone pairs).`);
                } else {
                    addTutorMessage(`Since it is a covalent bond, <b>build its Lewis Structure</b> on the whiteboard so that all comply with the octet (or duet) rule.`);
                }
                
                const b = currentScenario.builder;
                builderState.allAtoms = [];
                let aId = 0;
                builderState.allAtoms.push({ id: `a${aId++}`, sym: b.center });
                b.periph.forEach(sym => { builderState.allAtoms.push({ id: `a${aId++}`, sym: sym }); });
                
                builderState.inventory = [...builderState.allAtoms];
                builderState.placed = { center: null, 0: null, 1: null, 2: null, 3: null };
                builderState.bonds = [0, 0, 0, 0];
                builderState.lp = { center: 0, 0: 0, 1: 0, 2: 0, 3: 0 };
                
                renderBuilderUI();

                inputArea.innerHTML = `
                    <div class="flex flex-col fade-in">
                        <button onclick="checkInteractiveLewis('${displayForm}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded shadow-md transition-colors font-sans">Evaluate my structure</button>
                    </div>
                `;
            }, 1000);
        }

        function checkInteractiveLewis(displayForm) {
            currentStepAttempts++;
            const b = currentScenario.builder;
            const isDiatomic = b.periph.length === 1;
            
            if (builderState.inventory.length > 0) {
                addTutorMessage("You still have atoms in the inventory! Drag them all to the grid.");
                return;
            }

            const cPlaced = builderState.placed['center'];
            if (!cPlaced) {
                addTutorMessage("You need to place an atom in the central slot of the grid.");
                return;
            }
            if (!isDiatomic && cPlaced.sym !== b.center) {
                if(currentStepAttempts >= 3) {
                    addTutorMessage("You have used your 3 attempts. I'll show you the correct Lewis Structure.");
                    autoSolveLewis(); freezeLewisBoard();
                    safeSetTimeout(() => stepMassCalculation(currentScenario.c1, currentScenario.c2), 3000);
                    return;
                }
                addTutorMessage(`The atom you placed in the center (${cPlaced.sym}) is not the correct one. Remember it is usually the one that can form the most bonds.`);
                return;
            }

            let missingBonds = false; let wrongBonds = false; let bondsToVoid = false; let bondSum = 0;
            let wrongLp = false;
            let totalLp = builderState.lp['center'];
            
            if (builderState.lp['center'] !== b.expectedLp.center) wrongLp = true;

            if (isDiatomic) {
                let pSlot = -1;
                for (let i = 0; i < 4; i++) {
                    if (builderState.placed[i] !== null) pSlot = i;
                }
                
                if (pSlot === -1) {
                    addTutorMessage("You need to place the other atom in one of the peripheral slots.");
                    return;
                }
                
                const bondLvl = builderState.bonds[pSlot];
                if (bondLvl === 0) missingBonds = true;
                else if (bondLvl !== b.expectedBondLevel) wrongBonds = true;
                bondSum += bondLvl;
                
                for (let i = 0; i < 4; i++) {
                    if (i !== pSlot && builderState.bonds[i] > 0) bondsToVoid = true;
                }
                
                totalLp += builderState.lp[pSlot];
                if (builderState.lp[pSlot] !== b.expectedLp.periph[0]) wrongLp = true;
                
            } else {
                for (let i = 0; i < 4; i++) {
                    const hasPeriph = builderState.placed[i] !== null;
                    const bondLvl = builderState.bonds[i];
                    if (hasPeriph) {
                        if (bondLvl === 0) missingBonds = true;
                        else if (bondLvl !== b.expectedBondLevel) wrongBonds = true;
                        bondSum += bondLvl;
                    } else if (bondLvl > 0) bondsToVoid = true;
                }
                
                for(let i=0; i<b.periph.length; i++) {
                    totalLp += builderState.lp[i];
                    if (builderState.lp[i] !== b.expectedLp.periph[i]) wrongLp = true;
                }
            }

            let errors = [];
            if (bondsToVoid) errors.push("bonds not pointing to any atom");
            else if (missingBonds) errors.push("bonds missing to be drawn");
            else if (wrongBonds) errors.push("type of bonds (single/double)");
            if (wrongLp) errors.push("lone pairs on the atoms");

            inputArea.innerHTML = '';
            addUserMessage(`Proposed structure: ${bondSum} bonds and ${totalLp} lone pairs.`);

            safeSetTimeout(() => {
                if(errors.length === 0) {
                    let msg = `<b class="text-red-600 font-bold">Brilliant!</b> You have built the Lewis Structure perfectly.`;
                    if (currentScenario.type === 'covalent_atomic') {
                        msg += ` <br><br>Being a giant network, imagine that from the peripheral atoms more bonds go out to other atoms, extending infinitely in all three dimensions.`;
                    } else {
                        msg += " The shared and lone pairs are very well represented.";
                    }
                    addTutorMessage(msg);
                    freezeLewisBoard();
                    stepMassCalculation(currentScenario.c1, currentScenario.c2);
                } else {
                    if(currentStepAttempts >= 3) {
                        addTutorMessage("You have used your 3 attempts. I have generated the correct Lewis Structure on the whiteboard.");
                        autoSolveLewis(); freezeLewisBoard();
                        safeSetTimeout(() => stepMassCalculation(currentScenario.c1, currentScenario.c2), 3000);
                    } else {
                        let hint = "Double check if all atoms comply with the octet (or duet) rule. Count the electrons each bond provides and the ones left free.";
                        addTutorMessage(`Hmm, there is something to adjust in the <b>${errors.join(" and ")}</b>. <br><br>${hint}`);
                        safeSetTimeout(() => {
                            inputArea.innerHTML = `
                                <div class="flex flex-col fade-in">
                                    <button onclick="checkInteractiveLewis('${displayForm}')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded shadow-md transition-colors font-sans">Evaluate again</button>
                                </div>
                            `;
                        }, 500);
                    }
                }
            }, 800);
        }

        function renderBuilderUI() {
            let inventoryHtml = builderState.inventory.map(a =>
                `<div id="${a.id}" class="lewis-cell atom-box draggable-atom" draggable="true" ondragstart="handleDragStart(event, '${a.id}')">${a.sym}</div>`
            ).join('');

            let html = `
                <div class="mb-4 w-full px-6 font-sans" id="inventory-area">
                    <div class="text-sm font-semibold text-slate-600 mb-2 text-center"><i class="fas fa-boxes mr-1"></i> Atom inventory:</div>
                    <div class="flex flex-wrap gap-3 justify-center items-center min-h-[64px] p-3 border-2 border-dashed border-slate-300 rounded-lg bg-slate-100 shadow-inner dropzone"
                         ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDropEvent(event, 'inventory')">
                         ${inventoryHtml || '<span class="text-slate-400 text-xs italic">Empty</span>'}
                    </div>
                </div>
            `;

            const getDropzoneHtml = (pos, col, row) => {
                const atom = builderState.placed[pos];
                let atomClass = pos === 'center' ? 'center-atom-placed' : 'periph-atom-placed';
                let content = atom 
                    ? `<div id="${atom.id}" class="w-full h-full rounded-full flex items-center justify-center draggable-atom ${atomClass}" draggable="true" ondragstart="handleDragStart(event, '${atom.id}')" onclick="cycleLp('${pos}')">
                           ${atom.sym} ${drawLp(builderState.lp[pos], pos)}
                       </div>`
                    : '<span class="text-slate-300 text-[10px] tracking-tight">Drop</span>';
                
                return `<div class="lewis-cell atom-box dropzone" style="grid-column: ${col}; grid-row: ${row};"
                             ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDropEvent(event, '${pos}')">
                            ${content}
                        </div>`;
            };

            const getBondHtml = (index, col, row, isHorizontal) => {
                const canBond = builderState.placed['center'] && builderState.placed[index];
                const activeClass = canBond ? 'bond-box-active' : '';
                const drawFunc = isHorizontal ? drawBondH : drawBondV;
                const bondClass = isHorizontal ? 'bond-h' : 'bond-v';
                
                return `<div class="lewis-cell bond-box ${activeClass}" style="grid-column: ${col}; grid-row: ${row};" onclick="cycleBond(${index})">
                            <div class="${bondClass}">
                                ${drawFunc(builderState.bonds[index])}
                            </div>
                        </div>`;
            };

            html += `<div class="lewis-board shadow-sm relative">`;
            html += getDropzoneHtml('center', 3, 3);
            html += getDropzoneHtml(0, 1, 3); // Left
            html += getDropzoneHtml(1, 5, 3); // Right
            html += getDropzoneHtml(2, 3, 5); // Bottom
            html += getDropzoneHtml(3, 3, 1); // Top
            
            html += getBondHtml(0, 2, 3, true);  // Left Bond
            html += getBondHtml(1, 4, 3, true);  // Right Bond
            html += getBondHtml(2, 3, 4, false); // Bottom Bond
            html += getBondHtml(3, 3, 2, false); // Top Bond
            html += "</div>";
            
            html += `<div class="mt-3 text-center" id="lewis-reset">
                        <button onclick="resetLewisBoard()" class="text-xs text-red-500 hover:text-red-700 underline px-2 py-1 font-sans"><i class="fas fa-trash-alt mr-1"></i> Clear whiteboard</button>
                     </div>`;
            
            html += `<div class="text-xs text-slate-500 mt-2 text-center max-w-sm font-sans" id="lewis-instructions">
                        <b>1)</b> Drag atoms to the slots. <br>
                        <b>2)</b> Click between them to create bonds. <br>
                        <b>3)</b> Click on <b>any placed atom</b> to add its lone pairs (··).
                     </div>`;

            document.getElementById('stage-content').innerHTML = `<div class="fade-in w-full flex flex-col items-center">${html}</div>`;
        }

        function drawLp(lpCount, pos, forStatic = false) {
            if (lpCount === 0) return '';
            
            let available = [];
            if (pos === 'center') {
                available = ['top', 'bottom', 'left', 'right'];
                if (builderState.placed[0]) available = available.filter(s => s !== 'left');
                if (builderState.placed[1]) available = available.filter(s => s !== 'right');
                if (builderState.placed[2]) available = available.filter(s => s !== 'bottom');
                if (builderState.placed[3]) available = available.filter(s => s !== 'top');
            } else if (pos == 0) { available = ['top', 'bottom', 'left']; }
              else if (pos == 1) { available = ['top', 'bottom', 'right']; }
              else if (pos == 2) { available = ['bottom', 'left', 'right']; }
              else if (pos == 3) { available = ['top', 'left', 'right']; }

            let html = '';
            const styles = {
                'top': 'top: -6px; left: 50%; transform: translateX(-50%);',
                'bottom': 'bottom: -6px; left: 50%; transform: translateX(-50%);',
                'left': 'left: -6px; top: 50%; transform: translateY(-50%) rotate(90deg);',
                'right': 'right: -6px; top: 50%; transform: translateY(-50%) rotate(90deg);'
            };

            const fallbackSlots = ['top', 'bottom', 'left', 'right'];

            for (let i = 0; i < lpCount; i++) {
                let slot = available[i];
                if (!slot) {
                    const centerDir = pos == 0 ? 'right' : pos == 1 ? 'left' : pos == 2 ? 'top' : pos == 3 ? 'bottom' : '';
                    slot = fallbackSlots.find(s => !available.includes(s) && s !== centerDir);
                    if(!slot) slot = fallbackSlots[i % 4]; 
                }
                html += `<div class="lp-dot" style="${styles[slot]}">··</div>`;
            }
            return html;
        }

        function drawBondH(level) {
            if (level === 0) return '<span class="text-slate-300 text-[10px] tracking-tighter self-center">click</span>';
            let lines = '';
            for(let i=0; i<level; i++) lines += '<div class="bond-line-h"></div>';
            return lines;
        }

        function drawBondV(level) {
            if (level === 0) return '<span class="text-slate-300 text-[10px] tracking-tighter self-center" style="writing-mode: vertical-rl">click</span>';
            let lines = '';
            for(let i=0; i<level; i++) lines += '<div class="bond-line-v"></div>';
            return lines;
        }

        function autoSolveLewis() {
            const b = currentScenario.builder;
            builderState.inventory = [];
            builderState.bonds = [0,0,0,0];
            builderState.lp = { center: b.expectedLp.center, 0: 0, 1: 0, 2: 0, 3: 0 };
            builderState.placed = { center: null, 0: null, 1: null, 2: null, 3: null };

            let unusedAtoms = [...builderState.allAtoms];
            let centerIdx = unusedAtoms.findIndex(a => a.sym === b.center);
            builderState.placed['center'] = unusedAtoms.splice(centerIdx, 1)[0];

            for (let i = 0; i < b.periph.length; i++) {
                let pIdx = unusedAtoms.findIndex(a => a.sym === b.periph[i]);
                let slotIdx = (b.periph.length === 1) ? 1 : i;
                builderState.placed[slotIdx] = unusedAtoms.splice(pIdx, 1)[0];
                builderState.bonds[slotIdx] = b.expectedBondLevel;
                builderState.lp[slotIdx] = b.expectedLp.periph[i];
            }
            renderBuilderUI();
        }

        function freezeLewisBoard() {
            document.querySelectorAll('[draggable="true"]').forEach(el => el.removeAttribute('draggable'));
            document.querySelectorAll('.dropzone').forEach(el => el.classList.remove('dropzone'));
            document.querySelectorAll('.bond-box').forEach(el => el.onclick = null);
            document.querySelectorAll('.bond-box-active').forEach(el => el.classList.remove('bond-box-active', 'cursor-pointer'));
            document.querySelectorAll('.center-atom-placed, .periph-atom-placed').forEach(el => el.onclick = null);
            window.cycleLp = function() {}; 
            
            const invArea = document.getElementById('inventory-area');
            if(invArea) invArea.style.display = 'none';
            const inst = document.getElementById('lewis-instructions');
            if(inst) inst.style.display = 'none';
            const resetBtn = document.getElementById('lewis-reset');
            if(resetBtn) resetBtn.style.display = 'none';
        }

        function generateStaticLewisHTML(scenario) {
            const b = scenario.builder;
            const expectedLp = b.expectedLp;
            const isCovAt = scenario.type === 'covalent_atomic';
            
            const placed = { center: true, 0: b.periph.length > 0, 1: b.periph.length > 1, 2: b.periph.length > 2, 3: b.periph.length > 3 };
            
            if (b.periph.length === 1) {
                placed[0] = false; placed[1] = true; placed[2] = false; placed[3] = false;
            }
            
            const bonds = { 0: placed[0] ? b.expectedBondLevel : 0, 1: placed[1] ? b.expectedBondLevel : 0, 2: placed[2] ? b.expectedBondLevel : 0, 3: placed[3] ? b.expectedBondLevel : 0 };

            function localDrawLp(lpCount, pos) {
                if (lpCount === 0) return '';
                let available = [];
                if (pos === 'center') {
                    available = ['top', 'bottom', 'left', 'right'];
                    if (placed[0]) available = available.filter(s => s !== 'left');
                    if (placed[1]) available = available.filter(s => s !== 'right');
                    if (placed[2]) available = available.filter(s => s !== 'bottom');
                    if (placed[3]) available = available.filter(s => s !== 'top');
                } else if (pos == 0) { available = ['top', 'bottom', 'left']; }
                  else if (pos == 1) { available = ['top', 'bottom', 'right']; }
                  else if (pos == 2) { available = ['bottom', 'left', 'right']; }
                  else if (pos == 3) { available = ['top', 'left', 'right']; }

                let h = '';
                const styles = {
                    'top': 'top: -6px; left: 50%; transform: translateX(-50%);',
                    'bottom': 'bottom: -6px; left: 50%; transform: translateX(-50%);',
                    'left': 'left: -6px; top: 50%; transform: translateY(-50%) rotate(90deg);',
                    'right': 'right: -6px; top: 50%; transform: translateY(-50%) rotate(90deg);'
                };
                for (let i = 0; i < lpCount; i++) {
                    if(available[i]) h += `<div class="lp-dot" style="${styles[available[i]]}">··</div>`;
                }
                return h;
            }

            let html = '<div class="lewis-board shadow-none border-none bg-transparent !p-0 transform scale-90" style="pointer-events: none; margin-bottom: 0;">';

            html += `<div class="lewis-cell atom-box center-atom-placed" style="grid-column: 3; grid-row: 3; border-color: ${isCovAt?'#94a3b8':'#818cf8'};">
                        ${b.center} ${localDrawLp(expectedLp.center, 'center')}
                     </div>`;
            
            const drawH = (lvl) => { let l = ''; for(let i=0; i<lvl; i++) l += '<div class="bond-line-h"></div>'; return `<div class="bond-h">${l}</div>`; };
            const drawV = (lvl) => { let l = ''; for(let i=0; i<lvl; i++) l += '<div class="bond-line-v"></div>'; return `<div class="bond-v">${l}</div>`; };

            if (placed[0]) {
                let dash0 = isCovAt ? `<div style="position:absolute; width: 25px; border-bottom: 3px dashed #94a3b8; right: 100%; top: 50%;"></div>` : '';
                html += `<div class="lewis-cell atom-box periph-atom-placed" style="grid-column: 1; grid-row: 3; position: relative; border-color: ${isCovAt?'#94a3b8':'#cbd5e1'};">${b.periph[0]} ${localDrawLp(expectedLp.periph[0], 0)}${dash0}</div>`;
                html += `<div class="lewis-cell bond-box" style="grid-column: 2; grid-row: 3;">${drawH(bonds[0])}</div>`;
            }
            if (placed[1]) {
                let dash1 = isCovAt ? `<div style="position:absolute; width: 25px; border-bottom: 3px dashed #94a3b8; left: 100%; top: 50%;"></div>` : '';
                html += `<div class="lewis-cell atom-box periph-atom-placed" style="grid-column: 5; grid-row: 3; position: relative; border-color: ${isCovAt?'#94a3b8':'#cbd5e1'};">${b.periph[b.periph.length === 1 ? 0 : 1]} ${localDrawLp(expectedLp.periph[b.periph.length === 1 ? 0 : 1], 1)}${dash1}</div>`;
                html += `<div class="lewis-cell bond-box" style="grid-column: 4; grid-row: 3;">${drawH(bonds[1])}</div>`;
            }
            if (placed[2]) {
                let dash2 = isCovAt ? `<div style="position:absolute; height: 25px; border-left: 3px dashed #94a3b8; top: 100%; left: 50%;"></div>` : '';
                html += `<div class="lewis-cell atom-box periph-atom-placed" style="grid-column: 3; grid-row: 5; position: relative; border-color: ${isCovAt?'#94a3b8':'#cbd5e1'};">${b.periph[2]} ${localDrawLp(expectedLp.periph[2], 2)}${dash2}</div>`;
                html += `<div class="lewis-cell bond-box" style="grid-column: 3; grid-row: 4;">${drawV(bonds[2])}</div>`;
            }
            if (placed[3]) {
                let dash3 = isCovAt ? `<div style="position:absolute; height: 25px; border-left: 3px dashed #94a3b8; bottom: 100%; left: 50%;"></div>` : '';
                html += `<div class="lewis-cell atom-box periph-atom-placed" style="grid-column: 3; grid-row: 1; position: relative; border-color: ${isCovAt?'#94a3b8':'#cbd5e1'};">${b.periph[3]} ${localDrawLp(expectedLp.periph[3], 3)}${dash3}</div>`;
                html += `<div class="lewis-cell bond-box" style="grid-column: 3; grid-row: 2;">${drawV(bonds[3])}</div>`;
            }

            html += '</div>';
            return html;
        }

        // --- ATOMIC OR MOLECULAR MASS CALCULATION ---
        function stepMassCalculation(c1, c2, isRetry = false, prevMass = '', prevUnit = '') {
            if (!isRetry) currentStepAttempts = 0;
            const a1 = elementsDB[currentScenario.e1];
            const a2 = elementsDB[currentScenario.e2];
            const isIonic = currentScenario.type === 'ionic';
            const isHomo = currentScenario.e1 === currentScenario.e2;
            const isNone = currentScenario.type === 'none';
            const isMetallic = currentScenario.type === 'metallic';
            const isCovalentAtomic = currentScenario.type === 'covalent_atomic';
            
            let massName = 'molecular mass (<i>M</i><sub>r</sub>)';
            if (isIonic || (isCovalentAtomic && !isHomo)) massName = 'formula mass (<i>M</i><sub>r</sub>)';
            else if (isNone || isMetallic || (isCovalentAtomic && isHomo)) massName = 'atomic mass (<i>A</i><sub>r</sub>)';

            safeSetTimeout(() => {
                if (!isRetry) {
                    if (isHomo && !isCovalentAtomic) {
                        addTutorMessage(`Now let's calculate the <b>${massName}</b>. Knowing that the atomic mass of ${a1.sym} is ${a1.mass.toFixed(2)} u.<br><br>What is the total mass of the formula and in what unit is it measured?`);
                    } else if (isCovalentAtomic && isHomo) {
                        addTutorMessage(`Now let's calculate the <b>${massName}</b>. Knowing that the atomic mass of ${a1.sym} is ${a1.mass.toFixed(2)} u.<br><br>What is the atomic mass of the element in the network and in what unit is it measured?`);
                    } else {
                        addTutorMessage(`Now let's calculate the <b>${massName}</b>. Knowing that the atomic masses are:<br>• ${a1.sym}: ${a1.mass.toFixed(2)} u<br>• ${a2.sym}: ${a2.mass.toFixed(2)} u<br><br>What is the total mass of the formula and in what unit is it measured?`);
                    }
                }

                inputArea.innerHTML = `
                    <div class="flex flex-col space-y-2 fade-in font-sans text-slate-800">
                        <div class="flex items-center justify-center space-x-2">
                            <input type="text" id="calcMass" value="${prevMass}" placeholder="E.g. 45.02" class="border border-slate-300 rounded p-2 w-24 text-center focus:ring-2 outline-none bg-white text-slate-800">
                            <input type="text" id="calcUnit" value="${prevUnit}" placeholder="Unit" class="border border-slate-300 rounded p-2 w-20 text-center focus:ring-2 outline-none bg-white text-slate-800">
                        </div>
                        <button onclick="checkMass(${c1}, ${c2})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition-colors font-sans">Verify Mass</button>
                    </div>
                `;
            }, isRetry ? 100 : 1500);
        }

        function checkMass(c1, c2) {
            const userMassRaw = document.getElementById('calcMass').value.trim();
            const userUnitRaw = document.getElementById('calcUnit').value.trim();

            if (!userMassRaw || !userUnitRaw) {
                addTutorMessage("Please fill in both the mass and unit boxes before checking.");
                return;
            }

            currentStepAttempts++;
            
            const userMass = parseFloat(userMassRaw.replace(',', '.')); 
            const userUnit = userUnitRaw; 

            const a1 = elementsDB[currentScenario.e1];
            const a2_sym = currentScenario.e2;
            const a2 = elementsDB[a2_sym];
            const expectedMass = (c1 * a1.mass + (c2 ? c2 * a2.mass : 0)).toFixed(2);
            
            const isMassCorrect = !isNaN(userMass) && Math.abs(userMass - parseFloat(expectedMass)) < 0.05;
            const isUnitCorrect = userUnit === 'u'; 

            inputArea.innerHTML = '';
            addUserMessage(`${userMassRaw} ${userUnitRaw}`);

            safeSetTimeout(() => {
                if (isMassCorrect && isUnitCorrect) {
                    addTutorMessage(`<b class="text-red-600 font-bold">Perfect!</b> The mass is correct: <b class="text-red-600 font-bold">${expectedMass.replace('.', '.')} u</b>.`);
                    stepMicroscopicStructure();
                } else {
                    if (currentStepAttempts >= 3) {
                        addTutorMessage(`You have used your 3 attempts. The correct mass is <b class="text-red-600 font-bold">${expectedMass.replace('.', '.')} u</b>.`);
                        safeSetTimeout(() => stepMicroscopicStructure(), 2500);
                    } else {
                        let errorMsg = "Hmm, check your answer. ";
                        
                        if (!isUnitCorrect && isMassCorrect) {
                            if (userUnit.toLowerCase() === 'u') {
                                errorMsg += `The numerical value is correct, but <b class="text-amber-600 font-bold">careful with notation!</b> The official symbol for the atomic mass unit is not accepted in uppercase.`;
                            } else {
                                errorMsg += `The numerical value is correct, but there is a <b class="text-amber-600 font-bold">unit error</b>. Review the official international symbol (a single lowercase letter) for the unified atomic mass unit. Old abbreviations or other units are not accepted.`;
                            }
                        } else if (!isMassCorrect && isUnitCorrect) {
                            if (currentStepAttempts === 1) {
                                errorMsg += `There is an error in the <b>numerical value of the mass</b>. Think about it a bit more and try again!`;
                            } else {
                                const isHomo = currentScenario.e1 === currentScenario.e2;
                                const isCovalentAtomic = currentScenario.type === 'covalent_atomic';
                                if (isHomo || (isCovalentAtomic && isHomo)) {
                                    let totalCount = c1 + (c2 || 0);
                                    let cText = totalCount === 1 ? "1 time" : `${totalCount} times`;
                                    errorMsg += `There is a numerical error. Add the mass of ${a1.sym} ${cText}. `;
                                } else {
                                    let c1Text = c1 === 1 ? "1 time" : `${c1} times`;
                                    let c2Text = c2 === 1 ? "1 time" : `${c2} times`;
                                    errorMsg += `There is a numerical error. Add the mass of ${a1.sym} ${c1Text} and the mass of ${a2.sym} ${c2Text}. `;
                                }
                            }
                        } else {
                            if (currentStepAttempts === 1) {
                                errorMsg += `There are errors in both the <b>numerical value</b> and the <b>unit</b>. Check both!`;
                            } else {
                                const isHomo = currentScenario.e1 === currentScenario.e2;
                                const isCovalentAtomic = currentScenario.type === 'covalent_atomic';
                                if (isHomo || (isCovalentAtomic && isHomo)) {
                                    let totalCount = c1 + (c2 || 0);
                                    let cText = totalCount === 1 ? "1 time" : `${totalCount} times`;
                                    errorMsg += `Calculate by adding the mass of ${a1.sym} ${cText}. Also, use the official single lowercase letter symbol for the unit.`;
                                } else {
                                    let c1Text = c1 === 1 ? "1 time" : `${c1} times`;
                                    let c2Text = c2 === 1 ? "1 time" : `${c2} times`;
                                    errorMsg += `Calculate by adding the mass of ${a1.sym} ${c1Text} and the mass of ${a2.sym} ${c2Text}. Also, use the official single lowercase letter symbol for the unit.`;
                                }
                            }
                        }
                        
                        addTutorMessage(errorMsg);
                        stepMassCalculation(c1, c2, true, userMassRaw, userUnitRaw); 
                    }
                }
            }, 800);
        }

        // --- MICROSCOPIC STRUCTURE ---
        function stepMicroscopicStructure(isRetry = false) {
            if (!isRetry) currentStepAttempts = 0;
            safeSetTimeout(() => {
                if (!isRetry) {
                    addTutorMessage("Choose the type of <b>microscopic structure</b> that this substance will form:");
                }
                
                inputArea.innerHTML = `
                    <div class="flex flex-col space-y-2 fade-in font-sans text-slate-800">
                        <select id="microStructure" class="border border-slate-300 rounded p-2 focus:ring-2 outline-none w-full text-sm bg-white text-slate-800">
                            <option value="">Select the structure...</option>
                            <option value="atomos_sueltos">Loose isolated atoms</option>
                            <option value="red_metalica">Metallic crystal lattice</option>
                            <option value="red_iones">Ionic crystal lattice</option>
                            <option value="red_atomos">Neutral atom crystal lattice</option>
                            <option value="moleculas">Molecules</option>
                        </select>
                        <button onclick="checkMicroscopicStructure()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 rounded transition-colors font-sans">Check Structure</button>
                    </div>
                `;
            }, isRetry ? 100 : 1000);
        }

        function checkMicroscopicStructure() {
            currentStepAttempts++;
            const selectEl = document.getElementById('microStructure');
            const userChoice = selectEl.value;
            const choiceText = selectEl.options[selectEl.selectedIndex]?.text || '';
            
            if(!userChoice) {
                addTutorMessage("Please select an option from the dropdown.");
                return;
            }

            inputArea.innerHTML = '';
            addUserMessage(choiceText);

            let expectedChoice = '';
            if (currentScenario.type === 'ionic') expectedChoice = 'red_iones';
            else if (currentScenario.type === 'metallic') expectedChoice = 'red_metalica';
            else if (currentScenario.type === 'none') expectedChoice = 'atomos_sueltos';
            else if (currentScenario.type === 'covalent_atomic') expectedChoice = 'red_atomos';
            else expectedChoice = 'moleculas';

            safeSetTimeout(() => {
                if (userChoice === expectedChoice) {
                    addTutorMessage(`<b class="text-red-600 font-bold">Excellent!</b> Knowing that this is its microscopic structure, let's define the type of formula.`);
                    stepFormulaType();
                } else {
                    if (currentStepAttempts >= 3) {
                        const expectedTextMap = {
                            'red_iones': 'Ionic crystal lattice',
                            'moleculas': 'Molecules',
                            'red_metalica': 'Metallic crystal lattice',
                            'atomos_sueltos': 'Loose isolated atoms',
                            'red_atomos': 'Neutral atom crystal lattice'
                        };
                        addTutorMessage(`You have used your 3 attempts. The correct structure is: <b class="text-red-600 font-bold">${expectedTextMap[expectedChoice]}</b>.`);
                        safeSetTimeout(() => stepFormulaType(), 2500);
                    } else {
                        let hint = "";
                        if (currentStepAttempts === 1) {
                            hint = "That is not the correct structure. Think about how the particles of this type of substance interact according to the bonds we just deduced.";
                        } else {
                            if (currentScenario.type === 'none') hint = "Remember: Noble gases do not bond to anything, so think about how their particles would be found freely in space.";
                            else if (currentScenario.type === 'metallic') hint = "Remember: Metals form solid crystal lattices composed of cations immersed in a sea of shared electrons.";
                            else if (currentScenario.type === 'ionic') hint = "Remember: Ionic compounds form large solid and ordered structures of positive and negative charges.";
                            else if (currentScenario.type === 'covalent_atomic') hint = "Remember: Diamond and quartz are covalent solids that form giant crystal networks where all atoms are held together by very strong covalent bonds.";
                            else hint = "Remember: The vast majority of simple covalent substances form small isolated groups of atoms bonded together.";
                        }
                        addTutorMessage(`Not quite. ${hint}`);
                        stepMicroscopicStructure(true); 
                    }
                }
            }, 800);
        }

        // --- FORMULA TYPE ---
        function stepFormulaType(isRetry = false) {
            if (!isRetry) currentStepAttempts = 0;
            
            safeSetTimeout(() => {
                if (!isRetry) {
                    addTutorMessage("And now, what type of chemical formula is it?");
                }

                inputArea.innerHTML = `
                    <div class="flex flex-col space-y-2 fade-in font-sans text-slate-800">

        function isPolarMolecular(sc) {
            const isHomo = sc.e1 === sc.e2;
            const apolarMolecules = ['H2', 'N2', 'O2', 'F2', 'Cl2', 'Br2', 'I2', 'CH4', 'CF4', 'CCl4', 'CBr4', 'CI4', 'SiH4', 'SiF4', 'SiCl4', 'SiBr4', 'SiI4', 'CO2', 'CS2'];

        function getExpectedPropertiesQualitative(sc) {

            let hard = 'duro';
            let therm = 'mala';
            let optic = 'vitreo';

            if (type === 'none') { 
                state = 'Gas';
                qualMelting = 'Muy bajo';
                qualBoiling = 'Muy bajo';
                condS = 'aislante';
                condL = 'aislante';
                solWater = 'insoluble';
                solApolar = 'insoluble';
                tough = 'no_aplica';
                duct = 'no_aplica';
                hard = 'no_aplica';
                therm = 'mala';
                optic = 'transparente_incoloro';
            } else if (type === 'metallic') { 
                state = 'Sólido'; 
                qualMelting = 'Alto';
                qualBoiling = 'Alto';
                condS = 'conductor';
                condL = 'conductor';
                solWater = (['Li', 'Na', 'K', 'Rb', 'Cs', 'Ca', 'Sr', 'Ba'].includes(sc.e1)) ? 'reacciona' : 'insoluble';
                solApolar = 'insoluble';
                tough = 'tenaz';
                duct = 'alta';
                hard = 'variable';
                therm = 'excelente';
                optic = 'metalico';
            } else if (type === 'covalent_atomic') { 
                state = 'Sólido'; 
                qualMelting = 'Muy alto';
                qualBoiling = 'Muy alto';
                condS = 'aislante';
                condL = 'aislante';
                solWater = 'insoluble';
                solApolar = 'insoluble';
                tough = 'fragil';
                duct = 'nula';
                hard = 'muy_duro';
                therm = 'excepcional';
                optic = 'adamantino';
            } else if (type === 'ionic') { 
                state = 'Sólido'; 
                qualMelting = 'Alto';
                qualBoiling = 'Alto';
                condS = 'aislante';
                condL = 'conductor';
                solWater = 'soluble';
                solApolar = 'insoluble';
                tough = 'fragil';
                duct = 'nula';
                hard = 'duro';
                therm = 'mala';
                optic = 'vitreo';
            } else if (type === 'covalent') { 
                state = (['I2', 'P4', 'S8'].includes(sc.form)) ? 'Sólido' : (['H2O', 'Br2'].includes(sc.form)) ? 'Líquido' : 'Gas';
                qualMelting = 'Bajo';
                qualBoiling = 'Bajo';
                condS = 'aislante';
                condL = 'aislante';
                if (isPolarMolecular(sc)) {
                    solWater = 'soluble';
                    solApolar = 'insoluble';
                } else {
                    solWater = 'insoluble';
                    solApolar = 'soluble';
                }
                tough = (state === 'Gas' || state === 'Líquido') ? 'no_aplica' : 'fragil';
                duct = (state === 'Gas' || state === 'Líquido') ? 'no_aplica' : 'nula';
                hard = (state === 'Gas' || state === 'Líquido') ? 'no_aplica' : 'blando';
                therm = 'mala';
                optic = 'transparente_mate';
            }

            return { state, qualMelting, qualBoiling, condS, condL, solWater, solApolar, tough, duct, hard, therm, optic };
        }

                let solText = (isO || isN) ? 'Insoluble / Reacts' : (isH ? 'Reacts violently' : 'Very soluble (approx. 400 g/L)');
                
                return {
                    m: `${exactM} ºC`,
                    b: `${exactB} ºC`,
                    d: `${1800 + variation * 15} kg/m³`,
                    sol: solText
                };
            }

            return { m: 'N/A', b: 'N/A', d: 'N/A', sol: 'Variable' };
        }

        // --- DRAG & DROP BUILDER HANDLERS AND UTILITIES ---
        window.handleDragStart = function(ev, id) {
            ev.dataTransfer.setData("text/plain", id);
        };
        window.allowDrop = function(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        };
        window.dragLeave = function(ev) {
            ev.currentTarget.classList.remove('drag-over');
        };
        window.handleDropEvent = function(ev, targetPos) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            
            const draggedId = ev.dataTransfer.getData("text/plain");
            if (!draggedId) return;

            const atomObj = builderState.allAtoms.find(a => a.id === draggedId);
            if (!atomObj) return;

            let oldPos = null;
            builderState.inventory = builderState.inventory.filter(a => a.id !== draggedId);
            for (let key of ['center', 0, 1, 2, 3]) {
                if (builderState.placed[key] && builderState.placed[key].id === draggedId) {
                    oldPos = key;
                    builderState.placed[key] = null;
                    break;
                }
            }

            if (oldPos !== null && oldPos !== 'center') builderState.bonds[oldPos] = 0; 
            if (oldPos === 'center') builderState.bonds = [0,0,0,0];

            if (targetPos === 'inventory') {
                builderState.inventory.push(atomObj);
            } else {
                const existing = builderState.placed[targetPos];
                if (existing) builderState.inventory.push(existing);
                builderState.placed[targetPos] = atomObj;
            }
            renderBuilderUI();
        };

        window.cycleBond = function(index) {
            if (!builderState.placed['center'] || !builderState.placed[index]) return; 
            builderState.bonds[index] = (builderState.bonds[index] + 1) % 4; 
            renderBuilderUI();
        };

        window.cycleLp = function(pos) {
            builderState.lp[pos] = (builderState.lp[pos] + 1) % 5; 
            renderBuilderUI();
        };
        
        window.resetLewisBoard = function() {
            const b = currentScenario.builder;
            builderState.allAtoms = [];
            let aId = 0;
            builderState.allAtoms.push({ id: `a${aId++}`, sym: b.center });
            b.periph.forEach(sym => { builderState.allAtoms.push({ id: `a${aId++}`, sym: sym }); });
            
            builderState.inventory = [...builderState.allAtoms];
            builderState.placed = { center: null, 0: null, 1: null, 2: null, 3: null };
            builderState.bonds = [0, 0, 0, 0];
            builderState.lp = { center: 0, 0: 0, 1: 0, 2: 0, 3: 0 };
            renderBuilderUI();
        };

        // --- INITIALIZE ON LOAD ---
        window.onload = () => {
            fillScenarioSelector();
            initSimulation();
        };
    </script>
